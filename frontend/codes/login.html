<!-- Login ID Field -->
<div data-purpose="input-group">
<label class="block text-sm font-semibold text-slate-700 mb-1.5" for="login-id">
            Login ID
          </label>
<input class="block w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 transition-all" id="login-id" name="login-id" placeholder="Enter your ID" required="" type="text"/>
</div>
<!-- Password Field -->
<div data-purpose="input-group">
<label class="block text-sm font-semibold text-slate-700 mb-1.5" for="password">
            Password
          </label>
<input class="block w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>

<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 rounded cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>

              Remember me
            </label>
</div>

</div>
</div>

            Sign In
          </button>
</div>
</form>
